services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: flashcard-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flashcard_engine}
      POSTGRES_USER: ${POSTGRES_USER:-flashcard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flashcard}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flashcard} -d ${POSTGRES_DB:-flashcard_engine}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: flashcard-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-flashcard_engine}
      DB_USER: ${POSTGRES_USER:-flashcard}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-flashcard}
      DB_SCHEMA: ${DB_SCHEMA:-flashcard_engine}
      JWT_SECRET: ${JWT_SECRET:-change-me-please-change-me-please-change-me}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-1440}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-20}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:5173}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_REGION: ${R2_REGION:-auto}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: flashcard-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
